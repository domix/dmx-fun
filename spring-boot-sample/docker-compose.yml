services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dmxfun
      POSTGRES_USER: dmxfun
      POSTGRES_PASSWORD: dmxfun
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmxfun -d dmxfun"]
      interval: 5s
      timeout: 5s
      retries: 5
