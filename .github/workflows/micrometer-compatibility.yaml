# Verifies that the fun-micrometer module remains compatible with multiple
# Micrometer versions. Micrometer is declared as compileOnly so users bring
# their own version and backend; this matrix catches regressions before they
# reach main.
#
# Triggered only on pull requests that touch micrometer/** or this workflow file.
# To run a specific version locally:
#   ./gradlew :micrometer:test -PmicrometerVersion=1.12.0
name: Micrometer compatibility

on:
  pull_request:
    # Run when the micrometer module or this workflow file is modified.
    paths:
      - 'micrometer/**'
      - '.github/workflows/micrometer-compatibility.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Covers all supported minor release lines from 1.5.x to 1.16.x.
        # Update this list when a new minor is released or an old one is EOL.
        micrometer-version:
          - '1.16.5'
          - '1.15.9'
          - '1.14.14'
          - '1.13.15'
          - '1.12.13'
          - '1.11.12'
          - '1.10.13'
          - '1.9.17'
          - '1.8.13'
          - '1.7.12'
          - '1.6.13'
          - '1.5.17'
    name: Micrometer ${{ matrix.micrometer-version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      # Pass the matrix version as a Gradle property; the build falls back to
      # the catalog version when the property is absent (local development).
      - run: ./gradlew :micrometer:test -PmicrometerVersion=${{ matrix.micrometer-version }}
