# Verifies that the fun-jakarta-jaxb module remains compatible with multiple
# Jakarta JSON-B / JAXB API versions. Both APIs are declared compileOnly so
# users bring their own Jakarta EE or MicroProfile runtime; this matrix catches
# regressions against older (but still supported) releases before they reach main.
#
# Triggered only on pull requests that touch jakarta-jaxb/** or this workflow.
# To run a specific combination locally:
#   ./gradlew :jakarta-jaxb:test \
#     -PjakartaJsonbVersion=2.0.0 -PyassonVersion=2.0.4 \
#     -PjakartaJaxbVersion=3.0.1  -PjaxbImplVersion=3.0.2 \
#     -PjakartaJsonApiVersion=2.0.2 -PparssonVersion=1.1.7
name: Jakarta JSON-B + JAXB compatibility

on:
  pull_request:
    paths:
      - 'jakarta-jaxb/**'
      - '.github/workflows/jakarta-jaxb-compatibility.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Jakarta EE 9 / JSON-B 2.x (Yasson 2.x)
          - label: 'EE 9  (JSON-B 2.0 / JAXB 3.0)'
            jsonb-version: '2.0.0'
            yasson-version: '2.0.4'
            jaxb-version: '3.0.1'
            jaxb-impl-version: '3.0.2'
            json-api-version: '2.0.2'
            parsson-version: '1.1.7'
          # Jakarta EE 10 / JSON-B 3.x (Yasson 3.x)
          - label: 'EE 10 (JSON-B 3.0 / JAXB 4.0)'
            jsonb-version: '3.0.0'
            yasson-version: '3.0.3'
            jaxb-version: '4.0.0'
            jaxb-impl-version: '4.0.5'
            json-api-version: '2.1.3'
            parsson-version: '1.1.7'
          # Latest stable (catalog defaults)
          - label: 'Latest stable'
            jsonb-version: '3.0.1'
            yasson-version: '3.0.4'
            jaxb-version: '4.0.2'
            jaxb-impl-version: '4.0.5'
            json-api-version: '2.1.3'
            parsson-version: '1.1.7'
    name: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      - run: >
          ./gradlew :jakarta-jaxb:test
          -PjakartaJsonbVersion=${{ matrix.jsonb-version }}
          -PyassonVersion=${{ matrix.yasson-version }}
          -PjakartaJaxbVersion=${{ matrix.jaxb-version }}
          -PjaxbImplVersion=${{ matrix.jaxb-impl-version }}
          -PjakartaJsonApiVersion=${{ matrix.json-api-version }}
          -PparssonVersion=${{ matrix.parsson-version }}
