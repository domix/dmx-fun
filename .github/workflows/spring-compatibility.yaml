# Verifies that the fun-spring module remains compatible with multiple Spring Framework
# versions. Spring is declared as compileOnly so users bring their own version;
# this matrix catches regressions against older (but still supported) release lines
# before they reach main.
#
# Triggered only on pull requests that touch spring/** or this workflow file.
# To run a specific version locally:
#   ./gradlew :spring:test -PspringVersion=6.1.14
#
# Integration tests use Testcontainers + PostgreSQL to validate real rollback/commit
# behaviour across isolation levels and connection pool semantics that in-memory
# databases do not reproduce faithfully.
name: Spring compatibility

on:
  pull_request:
    # Run when the spring module or this workflow file is modified.
    paths:
      - 'spring/**'
      - '.github/workflows/spring-compatibility.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Covers all actively supported Spring Framework minor release lines.
        # Update this list when a new minor is released or an old one reaches end-of-life.
        # Spring 6.0 OSS support ended 2024-12-31; keep it here until the module
        # drops support for it explicitly.
        spring-version: ['6.0.23', '6.1.21', '6.2.9', '7.0.6']
    name: Spring ${{ matrix.spring-version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      # Pass the matrix version as a Gradle property; the build falls back to
      # the catalog version when the property is absent (local development).
      - run: ./gradlew :spring:test -PspringVersion=${{ matrix.spring-version }}
