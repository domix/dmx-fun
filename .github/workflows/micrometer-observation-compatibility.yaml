# Verifies that the fun-observation module remains compatible with multiple
# Micrometer versions. micrometer-core is declared as compileOnly so users
# bring their own version and backend; this matrix catches regressions before
# they reach main.
#
# Triggered only on pull requests that touch observation/** or this workflow file.
# To run a specific version locally:
#   ./gradlew :observability:observation:test -PmicrometerVersion=1.12.0
name: Micrometer Observation compatibility

on:
  pull_request:
    # Run when the observation module, this workflow file, or the version catalog is modified.
    paths:
      - 'observability/observation/**'
      - '.github/workflows/micrometer-observation-compatibility.yaml'
      - 'gradle/libs.versions.toml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Covers all supported minor lines from 1.10.x (when Observation API was
        # introduced) through 1.16.x.
        micrometer-version:
          - '1.16.5'
          - '1.15.9'
          - '1.14.14'
          - '1.13.15'
          - '1.12.13'
          - '1.11.12'
          - '1.10.13'
    name: Micrometer ${{ matrix.micrometer-version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      # Pass the matrix version as a Gradle property; the build falls back to
      # the catalog version when the property is absent (local development).
      - run: ./gradlew :observability:observation:test -PmicrometerVersion=${{ matrix.micrometer-version }}
