# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
    paths:
      - 'lib/**'
      - 'assertj/**'
      - 'jackson/**'
      - 'spring/**'
      - 'resilience4j/**'
      - 'micrometer/**'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/gradle.yml'
  pull_request:
    branches: [ "main" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6.0.2
      - id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            relevant:
              - 'lib/**'
              - 'assertj/**'
              - 'jackson/**'
              - 'spring/**'
              - 'resilience4j/**'
              - 'micrometer/**'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/gradle.yml'

  build:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v6.0.2
    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Generate SBOMs
      run: ./gradlew cyclonedxDirectBom

    - name: Install CycloneDX CLI
      run: |
        curl -sSL https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.30.0/cyclonedx-linux-x64 -o cyclonedx
        echo "f89876326620f5fc78a9b27cc1af57d6ed13d019aab87490e1246a44a910babb  cyclonedx" | sha256sum --check
        chmod +x cyclonedx
        sudo mv cyclonedx /usr/local/bin/cyclonedx

    - name: Validate SBOMs
      run: |
        count=0
        while IFS= read -r -d '' f; do
          cyclonedx validate --input-file "$f" --input-format json --fail-on-errors
          count=$((count + 1))
        done < <(find . -name "bom.json" -path "*/build/reports/cyclonedx-direct/*" -print0)
        [[ $count -gt 0 ]] || { echo "No SBOM files found" >&2; exit 1; }

    - name: Add coverage to PR
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/**/build/reports/jacoco/**/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 40
        min-coverage-changed-files: 60

    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
    # If your project does not have the Gradle Wrapper configured, you can use the following configuration to run Gradle with a specified version.
    #
    # - name: Setup Gradle
    #   uses: gradle/actions/setup-gradle@da187c8e6ffbd3802e00f2477aa5a822b25f2dda # v4.4.4
    #   with:
    #     gradle-version: '8.9'
    #
    # - name: Build with Gradle 8.9
    #   run: gradle build

  dependency-submission:
    needs: changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6.0.2
    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v6
