name: Publish to Maven Central

on:
  push:
    branches: [ "main" ]
    paths:
      - 'bom/**'
      - 'core/**'
      - 'serialization/**'
      - 'observability/**'
      - 'resilience/**'
      - 'protocols/**'
      - 'frameworks/**'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the release tag

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # fetch all history and tags

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check whether version is a stable release
        id: release_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION is a SNAPSHOT — skipping stable release publish."
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION is a stable release — will publish."
          fi

      - name: Check whether v${{ steps.version.outputs.version }} is a new release
        id: tag_check
        if: steps.release_check.outputs.is_release == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping publish."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG not found — will publish."
          fi

      - name: Set up JDK
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        run: ./gradlew test

      - name: Publish all modules to Maven Central
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create and push release tag
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.release_check.outputs.is_release == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
