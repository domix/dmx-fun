# Verifies that the fun-quarkus module remains compatible with multiple Quarkus
# versions. quarkus-arc and quarkus-narayana-jta are declared as compileOnly so
# users bring their own Quarkus version; this matrix catches regressions against
# supported LTS and non-LTS release lines before they reach main.
#
# Triggered only on pull requests that touch frameworks/quarkus/**, the version
# catalog, or this workflow file.
# To run a specific version locally:
#   ./gradlew :frameworks:quarkus:runtime:test -PquarkusVersion=3.21.4
name: Quarkus compatibility

on:
  pull_request:
    paths:
      - 'frameworks/quarkus/**'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/quarkus-compatibility.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Covers the two active LTS lines (3.11.x, 3.35.x) and recent non-LTS releases.
        # Update the list when a new minor is released or an LTS reaches end-of-life.
        quarkus-version:
          - '3.11.3'
          - '3.21.4'
          - '3.31.4'
          - '3.35.1'
    name: Quarkus ${{ matrix.quarkus-version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      # Pass the matrix version as a Gradle property; the build falls back to
      # the catalog version when the property is absent (local development).
      - run: ./gradlew :frameworks:quarkus:runtime:test -PquarkusVersion=${{ matrix.quarkus-version }}
